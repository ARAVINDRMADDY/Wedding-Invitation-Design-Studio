        extend: {

            rosegold: '#B76E79',
            'rosegold-hover': '#9f5c66',
            'dark-gray': '#3A3A3A',
            'soft-pink': '#FFF1F0',
            white: '#FFFFFF'

      }
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInUp 0.6s ease-out forwards;
    }
    
    /* Ensure no horizontal scroll */
    html, body {
      overflow-x: hidden;
      width: 100%;
      height: 100%;
    }

    /* Custom Checkbox */
    input[type="checkbox"] {
      accent-color: #B76E79;
    }
  </style>
</head>

              </div>

              </div>

              <button

                  class="w-full py-2.5 mt-2 bg-rosegold hover:bg-rosegold-hover text-white text-sm font-bold rounded-lg transition-colors duration-300 flex items-center justify-center shadow-md shadow-rosegold/30"

              </div>

                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">Google</span>
                  </button>

                  <button 
                    type="button"
                    class="flex items-center justify-center px-2 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-[#222222] transition-all"
                  >
                    <i class="fab fa-facebook text-blue-600 text-lg ltr:mr-1 rtl:ml-1"></i>
                    <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">Facebook</span>
                  </button>

                  <button 
                    type="button"
                    class="flex items-center justify-center px-2 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-[#222222] transition-all"
                  >
                    <i class="fab fa-apple text-dark-gray dark:text-white text-lg ltr:mr-1 rtl:ml-1"></i>
                    <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">Apple</span>
                  </button>
              </div>

            </form>

  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    function handleLogin(event) {
      event.preventDefault();

      const button = event.target.querySelector('button[type="submit"]');
      const icon = button.querySelector('i');
      const span = button.querySelector('span');
      
      icon.className = 'fas fa-spinner fa-spin ltr:mr-2 rtl:ml-2';
      span.innerText = 'Signing In...';
      button.disabled = true;
      button.classList.add('opacity-80', 'cursor-not-allowed');

      setTimeout(() => {
        window.location.href = 'user-dashboard.html';
      }, 1500);
    }

    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
    if (localStorage.getItem('theme') === 'dark') html.classList.add('dark');

    const rtlToggle = document.getElementById('rtl-toggle');

    function toggleRTL() {
      if (html.getAttribute('dir') === 'rtl') {
        html.removeAttribute('dir');
        localStorage.setItem('direction', 'ltr');
      } else {
        html.setAttribute('dir', 'rtl');
        localStorage.setItem('direction', 'rtl');
      }
    }

    if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
    if (localStorage.getItem('direction') === 'rtl') html.setAttribute('dir', 'rtl');
  </script>
