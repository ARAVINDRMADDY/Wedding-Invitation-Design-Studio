<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Design Studio</title>
  <link rel="icon" type="image/jpeg" href="images/d7b64de7-7e0e-4dfa-a821-3c04a0161ed5.png">
  <script src="tailwind.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            rosegold: '#B76E79',
            'rosegold-hover': '#9f5c66',
            'dark-gray': '#3A3A3A',
            'soft-pink': '#FFF1F0',
            white: '#FFFFFF'
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInUp 0.6s ease-out forwards;
    }
    
    /* Ensure no horizontal scroll */
    html, body {
      overflow-x: hidden;
      width: 100%;
      height: 100%;
    }

    /* Custom Checkbox */
    input[type="checkbox"] {
      accent-color: #B76E79;
    }
  </style>
</head>
<body class="font-sans antialiased min-h-screen w-full relative flex flex-col bg-soft-pink dark:bg-[#121212] transition-colors duration-300">

  <div class="absolute inset-0 z-0 flex flex-col pointer-events-none fixed">
    <div class="h-[55%] bg-dark-gray relative overflow-hidden">
      <svg class="absolute inset-0 w-full h-full object-cover opacity-20" preserveAspectRatio="none" viewBox="0 0 1440 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,100 C200,300 400,0 720,100 C1040,200 1200,50 1440,150 L1440,0 L0,0 Z" fill="#B76E79"/>
        <path d="M0,200 C300,400 500,100 820,200 C1140,300 1300,150 1440,250 L1440,0 L0,0 Z" fill="#B76E79" opacity="0.5"/>
        <path d="M0,50 C250,150 450,-50 820,50 C1140,150 1350,0 1440,100 L1440,0 L0,0 Z" fill="#B76E79" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <nav class="bg-white/90 dark:bg-[#2A2A2A]/90 backdrop-blur-md fixed w-full top-0 z-50 shadow-sm border-b border-gray-200 dark:border-white/10 transition-all duration-300">
    <div class="max-w-[1400px] mx-auto nav-container px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex-shrink-0">
          <a href="index.html" class="flex items-center space-x-3">
            <div class="flex flex-col">
              <span class="text-2xl font-bold text-dark-gray dark:text-white nav-logo-text">Design <span class="text-rosegold">Studio</span></span>
            </div>
          </a>
        </div>
        <div class="flex items-center space-x-2">
          <button id="rtl-toggle" class="nav-icon-button w-8 h-8 rounded-full bg-gray-100 dark:bg-white/10 hover:bg-gray-200 dark:hover:bg-white/20 flex items-center justify-center text-gray-700 dark:text-white transition duration-300 ml-2 text-xs font-semibold" title="Toggle RTL">
            RTL
          </button>
          <button id="theme-toggle" class="nav-icon-button w-8 h-8 rounded-full bg-gray-100 dark:bg-white/10 hover:bg-gray-200 dark:hover:bg-white/20 flex items-center justify-center text-gray-700 dark:text-white transition duration-300 ml-2" title="Toggle Theme">
            <i class="fas fa-moon dark:hidden text-xs"></i>
            <i class="fas fa-sun hidden dark:inline text-xs"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="flex-1 flex items-center justify-center p-4 pt-24 pb-10 relative z-10">
    
    <div class="flex flex-col w-full max-w-[500px] bg-white dark:bg-dark-gray rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.25)] overflow-hidden opacity-0 animate-fade-in border border-gray-100 dark:border-gray-800">
        
        <div class="w-full p-8 md:p-10 flex flex-col justify-center">

            <div class="text-center mb-6">
              <div class="w-12 h-12 bg-soft-pink dark:bg-rosegold/10 rounded-full flex items-center justify-center mx-auto mb-3">
                <i class="fas fa-user-plus text-rosegold text-xl"></i>
              </div>
              <h2 class="text-2xl font-bold text-dark-gray dark:text-white mb-1">Create an Account</h2>
              <p class="text-sm text-gray-500 dark:text-gray-400">Join us to start designing</p>
            </div>

            <form class="space-y-4" onsubmit="handleRegister(event)">

              <div>
                  <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">
                    <i class="fas fa-user ltr:mr-2 rtl:ml-2 text-rosegold"></i>Full Name
                  </label>
                  <input 
                    type="text" 
                    required
                    placeholder="John Doe"
                    class="w-full px-4 py-2.5 text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-[#222222] dark:text-white focus:border-rosegold focus:ring-1 focus:ring-rosegold outline-none transition-all"
                  />
              </div>

              <div>
                  <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">
                    <i class="fas fa-envelope ltr:mr-2 rtl:ml-2 text-rosegold"></i>Email Address
                  </label>
                  <input 
                    type="email" 
                    required
                    placeholder="your.email@example.com"
                    class="w-full px-4 py-2.5 text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-[#222222] dark:text-white focus:border-rosegold focus:ring-1 focus:ring-rosegold outline-none transition-all"
                  />
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                      <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">
                        <i class="fas fa-lock ltr:mr-2 rtl:ml-2 text-rosegold"></i>Password
                      </label>
                      <div class="relative">
                        <input 
                            type="password" 
                            id="password"
                            required
                            placeholder="Create password"
                            class="w-full px-4 py-2.5 text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-[#222222] dark:text-white focus:border-rosegold focus:ring-1 focus:ring-rosegold outline-none transition-all"
                        />
                      </div>
                  </div>

                  <div>
                      <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">
                        <i class="fas fa-check-circle ltr:mr-2 rtl:ml-2 text-rosegold"></i>Confirm
                      </label>
                      <div class="relative">
                        <input 
                            type="password" 
                            id="confirm-password"
                            required
                            placeholder="Confirm password"
                            class="w-full px-4 py-2.5 text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-[#222222] dark:text-white focus:border-rosegold focus:ring-1 focus:ring-rosegold outline-none transition-all"
                        />
                      </div>
                  </div>
              </div>

              <div class="flex items-center text-sm mt-3 mb-2">
                  <label class="flex items-center cursor-pointer text-gray-600 dark:text-gray-400">
                    <input type="checkbox" required class="w-4 h-4 border-gray-300 rounded text-rosegold focus:ring-rosegold">
                    <span class="ltr:ml-2 rtl:mr-2">I agree to the <a href="#" class="text-rosegold hover:underline">Terms</a> & <a href="#" class="text-rosegold hover:underline">Privacy Policy</a></span>
                  </label>
              </div>

              <button 
                  type="submit"
                  class="w-full py-2.5 mt-2 bg-rosegold hover:bg-rosegold-hover text-white text-sm font-bold rounded-lg transition-colors duration-300 flex items-center justify-center shadow-md shadow-rosegold/30"
              >
                  <i class="fas fa-user-plus ltr:mr-2 rtl:ml-2"></i> <span>Sign Up</span>
              </button>

              <div class="relative my-5">
                  <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
                  </div>
                  <div class="relative flex justify-center text-xs">
                    <span class="px-3 bg-white dark:bg-dark-gray text-gray-500 dark:text-gray-400">Or register with</span>
                  </div>
              </div>

              <div class="grid grid-cols-3 gap-2">
                  <button type="button" class="flex items-center justify-center px-2 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-[#222222] transition-all">
                    <svg class="w-4 h-4 ltr:mr-1 rtl:ml-1" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">Google</span>
                  </button>
                  <button type="button" class="flex items-center justify-center px-2 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-[#222222] transition-all">
                    <i class="fab fa-facebook text-blue-600 text-lg ltr:mr-1 rtl:ml-1"></i>
                    <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">Facebook</span>
                  </button>
                  <button type="button" class="flex items-center justify-center px-2 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-[#222222] transition-all">
                    <i class="fab fa-apple text-dark-gray dark:text-white text-lg ltr:mr-1 rtl:ml-1"></i>
                    <span class="text-xs font-semibold text-gray-700 dark:text-gray-300">Apple</span>
                  </button>
              </div>

            </form>

            <div class="mt-6 text-center text-sm text-gray-600 dark:text-gray-400">
              Already have an account? 
              <a href="register.html" class="text-rosegold font-bold hover:underline transition-colors ltr:ml-1 rtl:mr-1">
                  Sign In Here
              </a>
            </div>

        </div>
    </div>
  </div>

  <script>
    function handleRegister(event) {
      event.preventDefault();

      const pass = document.getElementById('password').value;
      const confirmPass = document.getElementById('confirm-password').value;

      if (pass !== confirmPass) {
        alert("Passwords do not match!");
        return;
      }

      const button = event.target.querySelector('button[type="submit"]');
      const icon = button.querySelector('i');
      const span = button.querySelector('span');
      
      icon.className = 'fas fa-spinner fa-spin ltr:mr-2 rtl:ml-2';
      span.innerText = 'Creating Account...';
      button.disabled = true;
      button.classList.add('opacity-80', 'cursor-not-allowed');

      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    }

    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
    if (localStorage.getItem('theme') === 'dark') html.classList.add('dark');

    const rtlToggle = document.getElementById('rtl-toggle');

    function toggleRTL() {
      if (html.getAttribute('dir') === 'rtl') {
        html.removeAttribute('dir');
        localStorage.setItem('direction', 'ltr');
      } else {
        html.setAttribute('dir', 'rtl');
        localStorage.setItem('direction', 'rtl');
      }
    }

    if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
    if (localStorage.getItem('direction') === 'rtl') html.setAttribute('dir', 'rtl');
  </script>

</body>
</html>
